<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Back! It! Up! — add client</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div class="app">
    <nav class="sidebar" aria-label="Primary">
      <span class="brand"><span class="sq">▣</span> Back! It! Up!</span>
      <div class="nav">
        <a href="/">Dashboard</a>
        <a href="/clients/new" class="active" aria-current="page">Add client</a>
        <a href="/settings">Settings</a>
      </div>
    </nav>
    <main class="main">
      <h1>Add a client</h1>
      <p class="summary">A client backs up one directory on one host. You'll get a key, a token, and a cron line to paste on that host.</p>
      {{if .Error}}<div class="error" role="alert">{{.Error}}</div>{{end}}
      <form method="post" action="/clients" class="form">
        <label for="name">Name</label>
        <input id="name" name="name" required autofocus placeholder="laptop-docs">

        <label for="mode">Mode</label>
        <select id="mode" name="mode">
          <option value="targz">targz — dated snapshot archives</option>
          <option value="rsync">rsync — hardlink incremental snapshots</option>
        </select>

        <label for="source_label">Source label (description)</label>
        <input id="source_label" name="source_label" placeholder="~/Documents on my laptop">

        <div class="row">
          <div>
            <label for="retention_days">Hot retention (days)</label>
            <input id="retention_days" name="retention_days" type="number" min="1" value="14">
          </div>
          <div>
            <label for="offsite_retention_days">Offsite retention (days)</label>
            <input id="offsite_retention_days" name="offsite_retention_days" type="number" min="1" value="90">
          </div>
          <div>
            <label for="expected_interval_secs">Expected interval (s, 0 = unknown)</label>
            <input id="expected_interval_secs" name="expected_interval_secs" type="number" min="0" value="86400">
          </div>
        </div>

        <label for="offsite_remote">Offsite remote (rclone, blank = none)</label>
        <input id="offsite_remote" name="offsite_remote" placeholder="s3">

        <label style="margin-top:18px;display:block">
          <input type="checkbox" name="skip_symlinks" value="1">
          Skip symlinks — exclude symbolic links from the backup
          <span style="color:var(--text-dim);font-weight:400">(also settable per-run with <code>BACKITUP_SKIP_SYMLINKS=1</code>)</span>
        </label>

        <label style="margin-top:18px;display:block">API scheme <span style="color:var(--text-dim);font-weight:400">(for the generated docker run command)</span></label>
        <div class="radio-group">
          <label><input type="radio" name="api_scheme" value="http" checked> http — LAN / behind a TLS proxy</label>
          <label style="margin-left:16px"><input type="radio" name="api_scheme" value="https"> https — direct TLS</label>
        </div>

        <button class="btn" type="submit" style="margin-top:20px">Create client</button>
      </form>
    </main>
  </div>
</body>
</html>
