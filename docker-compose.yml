# backitup server stack (design doc D1: one app container + one sshd container).
#
# `docker compose up -d --build` builds and runs both: the control plane (`app`)
# and the SSH ingest plane (`sshd`). The app writes per-client entries into the
# shared `authkeys` volume (atomic, validated; D4); clients rsync / stream into
# per-client confined directories on the shared `backups` volume.
#
# Clients are NOT services here — they are dumb, cron-triggered one-shot
# containers that run on each HOST. See the README "Client setup" section.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: th0rn0/backitup-server:dev
    restart: unless-stopped
    environment:
      BACKITUP_DB: /data/backitup.db
      BACKITUP_ADDR: ":8080"
      # Admin login (change these; the app upserts the admin on start).
      BACKITUP_ADMIN_USER: ${BACKITUP_ADMIN_USER:-admin}
      BACKITUP_ADMIN_PASSWORD: ${BACKITUP_ADMIN_PASSWORD:?set BACKITUP_ADMIN_PASSWORD in your env/.env}
      # Ingest wiring (must match the sshd service's mounts).
      BACKITUP_AUTHKEYS: /srv/authkeys/authorized_keys
      BACKITUP_BACKUP_DIR: /srv/backups
      # Shown in the generated client cron line.
      BACKITUP_PUBLIC_HOST: ${BACKITUP_PUBLIC_HOST:-your-server:2222}
      BACKITUP_CLIENT_IMAGE: ${BACKITUP_CLIENT_IMAGE:-th0rn0/backitup-client:dev}
      # Lifecycle worker (offsite + retention + integrity). rclone.conf defines
      # the encrypted crypt remote(s) a client's OffsiteRemote points at.
      BACKITUP_RCLONE_CONFIG: ${BACKITUP_RCLONE_CONFIG:-/data/rclone.conf}
      BACKITUP_LIFECYCLE_INTERVAL: ${BACKITUP_LIFECYCLE_INTERVAL:-1h}
      # SSH host key path (read from the shared volume; used to generate known_hosts
      # entries in the add-client UI so clients don't need BACKITUP_INSECURE=1).
      BACKITUP_SSH_HOST_KEY: /srv/hostkeys/ssh_host_ed25519_key.pub
      # For production, mount certs and set these to serve HTTPS:
      # BACKITUP_TLS_CERT: /certs/cert.pem
      # BACKITUP_TLS_KEY: /certs/key.pem
    ports:
      - "127.0.0.1:8080:8080" # expose via your own TLS reverse proxy
    volumes:
      - app-data:/data
      - backups:/srv/backups
      - authkeys:/srv/authkeys
      - sshd-hostkeys:/srv/hostkeys:ro # app reads host pubkey for known_hosts generation
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3

  sshd:
    build:
      context: .
      dockerfile: Dockerfile.sshd
    image: th0rn0/backitup-sshd:dev
    restart: unless-stopped
    ports:
      - "2222:2222" # the data channel clients connect to
    volumes:
      - backups:/srv/backups
      - authkeys:/srv/authkeys:ro # app writes, sshd only reads (D4)
      - sshd-hostkeys:/srv/hostkeys

volumes:
  app-data:
  backups:
  authkeys:
  sshd-hostkeys:
