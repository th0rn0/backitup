# backitup server stack (design doc D1: one app container + one sshd container).
#
# `docker compose up` builds and runs the control plane today (the `app` service).
# The `sshd` ingest service is the Lane A data plane: the app writes per-client
# entries into a shared authorized_keys volume (atomic, validated; D4) and clients
# rsync / sftp into per-client confined directories on the shared backups volume.
#
# Clients are NOT services here — they are dumb, cron-triggered one-shot containers
# that run on each HOST. See the README "Client setup" section.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/th0rn0/backitup-server:dev
    restart: unless-stopped
    environment:
      BACKITUP_DB: /data/backitup.db
      BACKITUP_ADDR: ":8080"
    ports:
      # Bind to localhost by default; expose via your own reverse proxy / TLS.
      - "127.0.0.1:8080:8080"
    volumes:
      - app-data:/data          # SQLite + config
      - backups:/srv/backups    # hot store (read by lifecycle, served for download)
      - authkeys:/srv/authkeys  # authorized_keys written for the sshd container (D4)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Lane A — SSH ingest plane. Placeholder image until the custom sshd image lands.
  # Mounts the same backups + authkeys volumes the app manages. Per-client access
  # is enforced by ForceCommand (internal-sftp+chroot for tar.gz, confined rrsync
  # for rsync) generated by the app into the authkeys volume.
  sshd:
    image: linuxserver/openssh-server:latest
    restart: unless-stopped
    ports:
      - "2222:2222"
    volumes:
      - backups:/srv/backups
      - authkeys:/config/.ssh/authorized_keys_dir:ro
    # NOTE: replace with the backitup sshd image (Lane A) which wires the
    # per-mode ForceCommand. This entry documents the topology; it is not yet
    # the production ingest configuration.

volumes:
  app-data:
  backups:
  authkeys:
